<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Gemini RAG</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h1 { color: #1a73e8; text-align: center; margin-bottom: 30px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1a73e8; color: #fff; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .footer { text-align: center; margin-top: 20px; font-size: 0.9rem; }
    </style>
</head>
<body>
<div class="card">
    <h1>Register</h1>
    <form id="registerForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <select id="role">
            <option value="CONSUMER">Consumer (Regular User)</option>
            <option value="USER">User (Admin/Training)</option>
        </select>
        <button type="submit">Create Account</button>
    </form>
    <div class="footer">
        Already have an account? <a href="{% url 'login_page' %}">Login here</a>
    </div>
</div>

<script>
    document.getElementById('registerForm').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch("{% url 'register_api' %}", {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            })
        });
        if (res.ok) {
            alert("Registration successful! Logging you in...");
            const data = await res.json();
            localStorage.setItem('access_token', data.access);
            window.location.href = "{% url 'chat_page' %}";
        } else {
            const err = await res.json();
            alert("Error: " + JSON.stringify(err));
        }
    };
</script>
</body>
</html>
