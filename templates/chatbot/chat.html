<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Gemini Chatbot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styles */
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #e0e0e0; display: flex; flex-direction: column; padding: 20px; }
        .sidebar h3 { font-size: 1.1rem; margin-bottom: 20px; color: #1a73e8; }
        .upload-section { margin-bottom: 30px; }
        .upload-btn-wrapper { position: relative; overflow: hidden; display: inline-block; width: 100%; }
        .btn-upload { border: 2px dashed #1a73e8; color: #1a73e8; background-color: #fff; padding: 12px 20px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; text-align: center; }
        .upload-btn-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; }
        .doc-list { flex: 1; overflow-y: auto; }
        .doc-item { padding: 10px; border-bottom: 1px solid #f1f3f4; font-size: 0.9rem; color: #5f6368; word-break: break-all; }
        
        /* Main Chat Area */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #f0f2f5; align-items: center; justify-content: center; padding: 20px; }
        .chat-container { width: 100%; max-width: 800px; background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); display: flex; flex-direction: column; height: 90vh; }
        .chat-header { background: #1a73e8; color: #fff; padding: 16px 20px; border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .clear-btn { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 18px; line-height: 1.5; font-size: 0.95rem; white-space: pre-wrap; word-break: break-word; }
        .message.user { background: #1a73e8; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
        .message.bot { background: #f1f3f4; color: #202124; align-self: flex-start; border-bottom-left-radius: 4px; }
        .message.typing { color: #888; font-style: italic; }
        .chat-input { display: flex; padding: 16px; border-top: 1px solid #e0e0e0; gap: 10px; background: #fff; border-radius: 0 0 12px 12px; }
        .chat-input textarea { flex: 1; border: 1px solid #ddd; border-radius: 24px; padding: 12px 20px; font-size: 0.95rem; resize: none; outline: none; max-height: 120px; font-family: inherit; }
        .send-btn { background: #1a73e8; color: #fff; border: none; border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
        .send-btn:disabled { background: #a0b4d0; }
        
        #uploadStatus { margin-top: 10px; font-size: 0.8rem; color: #1a73e8; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Knowledge Base</h3>
    
    <div style="margin-bottom: 20px;">
        <a href="{% url 'manage_training' %}" class="btn-upload" style="display: block; text-decoration: none; color: #1a73e8; margin-bottom: 10px;">
            &rarr; Training Center (Admin)
        </a>
        <a href="{% url 'fitness_analyst' %}" class="btn-upload" style="display: block; text-decoration: none; color: #2e7d32; border-color: #2e7d32;">
            &rarr; Fitness Analyst Dashboard
        </a>
    </div>

    <div style="margin-top: 20px;">
        <label style="font-size: 0.85rem; color: #5f6368;">Chat context filter:</label>
        <select id="chatFilter" style="width: 100%; padding: 8px; margin-top: 5px; border-radius: 6px; border: 1px solid #ddd;">
            <option value="">Search all documents</option>
            {% for type in document_types %}
                <option value="{{ type.id }}">Only: {{ type.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="doc-list" id="docList" style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
        <label style="font-size: 0.8rem; color: #888;">Available documents:</label>
        {% for doc in documents %}
            <div class="doc-item" style="font-size: 0.75rem;">{{ doc.file.name }}</div>
        {% endfor %}
    </div>
</div>

<div class="main-content">
    <div class="chat-container">
        <div class="chat-header">
            <h2>Gemini RAG Assistant</h2>
            <button class="clear-btn" onclick="clearChat()">Clear chat</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            {% for entry in chat_history %}
                <div class="message {% if entry.role == 'user' %}user{% else %}bot{% endif %}">{{ entry.text }}</div>
            {% empty %}
                <div class="message bot">Hello! Upload documents to train me, or ask anything!</div>
            {% endfor %}
        </div>
        <div class="chat-input">
            <textarea id="userInput" placeholder="Ask a question..." rows="1" onkeydown="handleKey(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#9658;</button>
        </div>
    </div>
</div>

<script>
    const messagesDiv = document.getElementById("chatMessages");
    const input = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const docList = document.getElementById("docList");
    const uploadStatus = document.getElementById("uploadStatus");

    function scrollToBottom() {
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }
    scrollToBottom();

    function appendMessage(role, text) {
        const div = document.createElement("div");
        div.className = "message " + role;
        div.textContent = text;
        messagesDiv.appendChild(div);
        scrollToBottom();
        return div;
    }

    function handleKey(e) {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    const chatFilter = document.getElementById("chatFilter");

    async function sendMessage() {
        const text = input.value.trim();
        const typeId = chatFilter.value;
        if (!text) return;

        input.value = "";
        input.style.height = "auto";
        sendBtn.disabled = true;

        appendMessage("user", text);
        const typing = appendMessage("bot typing", "Searching documents and thinking...");

        try {
            const res = await fetch("{% url 'send_message' %}", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    message: text,
                    type_id: typeId 
                })
            });
            const data = await res.json();
            typing.className = "message bot";
            typing.textContent = data.reply || data.error;
        } catch (err) {
            typing.className = "message bot";
            typing.textContent = "Error: could not reach server.";
        } finally {
            sendBtn.disabled = false;
            input.focus();
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById("fileInput");
        const typeSelect = document.getElementById("uploadType");
        const file = fileInput.files[0];
        const typeId = typeSelect.value;
        
        if (!file) return;
        if (!typeId) {
            alert("Please select a document type first!");
            fileInput.value = "";
            return;
        }

        const formData = new FormData();
        formData.append("file", file);
        formData.append("type_id", typeId);

        uploadStatus.textContent = "Uploading and processing...";
        
        try {
            const res = await fetch("{% url 'upload_document' %}", {
                method: "POST",
                body: formData
            });
            const data = await res.json();
            
            if (data.status === "success") {
                uploadStatus.textContent = "Success: " + data.filename;
                const item = document.createElement("div");
                item.className = "doc-item";
                item.textContent = `${data.filename} (${data.type})`;
                docList.prepend(item);
            } else {
                uploadStatus.textContent = "Error: " + data.message;
            }
        } catch (err) {
            uploadStatus.textContent = "Upload failed.";
        } finally {
            fileInput.value = "";
        }
    }

    async function clearChat() {
        await fetch("{% url 'clear_chat' %}");
        messagesDiv.innerHTML = "";
        appendMessage("bot", "Chat cleared. How can I help you today?");
    }

    input.addEventListener("input", function () {
        this.style.height = "auto";
        this.style.height = Math.min(this.scrollHeight, 120) + "px";
    });
</script>
</body>
</html>
