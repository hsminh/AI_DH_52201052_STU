<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fitness Analyst - AI Charts</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f7f4; padding: 40px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { margin-bottom: 30px; color: #2e7d32; border-bottom: 2px solid #e8f5e9; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; }
        textarea { width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; min-height: 100px; outline: none; }
        
        button { background: #2e7d32; color: #fff; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        button:disabled { background: #a5d6a7; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; display: none; }
        .card { background: #fff; padding: 20px; border: 1px solid #eee; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .card h3 { font-size: 1rem; margin-bottom: 15px; color: #2e7d32; border-left: 4px solid #2e7d32; padding-left: 10px; }
        
        .full-width { grid-column: span 2; }
        .chart-container { position: relative; height: 250px; width: 100%; display: flex; justify-content: center; }
        
        .data-list { list-style: none; }
        .data-list li { padding: 8px 0; border-bottom: 1px solid #f1f3f4; font-size: 0.9rem; }
        .data-list li b { color: #2e7d32; }
        
        .nav-link { display: inline-block; margin-bottom: 20px; color: #2e7d32; text-decoration: none; font-weight: bold; }
        .loading { display: none; text-align: center; margin-top: 20px; font-weight: bold; color: #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <a href="{% url 'chatbot' %}" class="nav-link">&larr; Back to Chat</a>
    <h1>Fitness Analyst Dashboard</h1>

    <div class="form-group">
        <label>Input your meal data:</label>
        <textarea id="userInput" placeholder="Example: 1 chén súp sáng nay..."></textarea>
    </div>
    <button id="analyzeBtn" onclick="getAnalysis()">Analyze & Generate Charts</button>
    
    <div class="loading" id="loading">AI is processing data...</div>

    <div class="dashboard" id="dashboard">
        <!-- Nutrition Chart -->
        <div class="card">
            <h3>Macro-Nutrient Distribution (g)</h3>
            <div class="chart-container">
                <canvas id="macroChart"></canvas>
            </div>
        </div>

        <!-- Calorie Summary -->
        <div class="card">
            <h3>Calorie Overview</h3>
            <div style="text-align: center; padding-top: 40px;">
                <h2 id="totalCal" style="font-size: 3rem; color: #2e7d32;">0</h2>
                <p>Total kcal estimated</p>
            </div>
        </div>

        <!-- Meal Analysis -->
        <div class="card full-width">
            <h3>AI Meal Analysis</h3>
            <p id="mealAnalysis" style="line-height: 1.6; font-size: 0.95rem;"></p>
        </div>

        <!-- Recommendations -->
        <div class="card">
            <h3>Recommend Food for Balance</h3>
            <ul class="data-list" id="foodList"></ul>
        </div>

        <!-- Exercise -->
        <div class="card">
            <h3>Exercise Program</h3>
            <ul class="data-list" id="exerciseList"></ul>
        </div>
    </div>
</div>

<script>
    let macroChartInstance = null;

    async function getAnalysis() {
        const input = document.getElementById("userInput");
        const btn = document.getElementById("analyzeBtn");
        const dashboard = document.getElementById("dashboard");
        const loading = document.getElementById("loading");
        
        const val = input.value.trim();
        if (!val) return alert("Please enter your data!");
        
        btn.disabled = true;
        loading.style.display = "block";
        dashboard.style.display = "none";
        
        const formData = new FormData();
        formData.append("user_input", val);
        formData.append("csrfmiddlewaretoken", "{{ csrf_token }}");

        try {
            const res = await fetch("{% url 'fitness_analyst' %}", {
                method: "POST",
                body: formData
            });
            const data = await res.json();
            
            if (data.analysis) {
                renderDashboard(data.analysis);
            } else {
                alert("Error: " + (data.error || "Failed to parse AI response"));
            }
        } catch (err) {
            alert("Failed to connect to server.");
        } finally {
            btn.disabled = false;
            loading.style.display = "none";
        }
    }

    function renderDashboard(data) {
        document.getElementById("dashboard").style.display = "grid";
        
        // Calories
        document.getElementById("totalCal").textContent = data.nutrition_summary.calories;
        
        // Analysis
        document.getElementById("mealAnalysis").textContent = data.meal_analysis;
        
        // Food List
        const foodList = document.getElementById("foodList");
        foodList.innerHTML = `
            <li><b>Morning:</b> ${data.recommend_food.morning}</li>
            <li><b>Lunch:</b> ${data.recommend_food.lunch}</li>
            <li><b>Evening:</b> ${data.recommend_food.evening}</li>
            <li><b>Snack:</b> ${data.recommend_food.snack}</li>
        `;
        
        // Exercise List
        const exerciseList = document.getElementById("exerciseList");
        exerciseList.innerHTML = `
            <li><b>Target:</b> ${data.exercise_program.target}</li>
            <li><b>Workout:</b> ${data.exercise_program.workout}</li>
            <li><b>Duration:</b> ${data.exercise_program.duration} mins</li>
            <li><b>Intensity:</b> ${data.exercise_program.intensity}</li>
        `;
        
        // Macro Chart
        renderChart(data.nutrition_summary);
    }

    function renderChart(summary) {
        const ctx = document.getElementById('macroChart').getContext('2d');
        
        if (macroChartInstance) {
            macroChartInstance.destroy();
        }
        
        macroChartInstance = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Protein', 'Carbs', 'Fats'],
                datasets: [{
                    data: [summary.protein, summary.carbs, summary.fats],
                    backgroundColor: ['#4caf50', '#2196f3', '#ff9800'],
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'bottom' }
                }
            }
        });
    }
</script>

</body>
</html>
